<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>CoachTek — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f7;
      color: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .offline-card {
      text-align: center;
      max-width: 340px;
    }
    .offline-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      border-radius: 16px;
      background: #b5d858;
      display: grid;
      place-items: center;
      font-size: 28px;
      font-weight: 700;
      color: #1b3a6b;
    }
    h1 { font-size: 20px; margin-bottom: 8px; }
    p { font-size: 14px; color: #6b7280; line-height: 1.5; margin-bottom: 24px; }
    .retry-btn {
      padding: 10px 28px;
      border: none;
      border-radius: 10px;
      background: #b5d858;
      color: #1b3a6b;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="offline-card">
    <div class="offline-icon">CT</div>
    <h1>You're offline</h1>
    <p>Check your connection and try again. CoachTek needs an internet connection to load for the first time.</p>
    <button class="retry-btn" onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
