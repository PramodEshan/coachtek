<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        var k = 'coachtek-theme';
        var t = localStorage.getItem(k);
        if (t !== 'light' && t !== 'dark') {
          t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.dataset.theme = t;
        document.documentElement.style.backgroundColor = t === 'dark' ? '#000000' : '#f5f5f7';
      })();
    </script>
    <script>
      (function () {
        var s = window.matchMedia('(display-mode: standalone)').matches
          || window.matchMedia('(display-mode: fullscreen)').matches
          || (navigator.standalone === true);
        if (s) document.documentElement.classList.add('ct-standalone-pwa');
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#b5d858" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CoachTek" />
    <meta name="description" content="CoachTek — coach platform console for sessions, clients, and programs." />
    <title>CoachTek</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
